[theme]
base = "dark"
primaryColor = "#e2b04a"
backgroundColor = "#1a1a2e"
secondaryBackgroundColor = "#16213e"
textColor = "#e8e8e8"
font = "sans serif"

[client]
showErrorDetails = false
toolbarMode = "minimal"

[server]
maxUploadSize = 5
enableXsrfProtection = true

[browser]
gatherUsageStats = false
